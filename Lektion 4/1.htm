<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Area Calculator</h1>

    <input id="length" placeholder="Length">
    <input id="width" placeholder="Width">
    <button id="calcBtn">Calculate</button>

    <p id="result"></p>

    <script>
        // The cheecker, makes sure that the input is correct
        let validNumber = (value) => {
            if (value === '') return false; // If nothing returns false
            if (value.includes(' ')) return false; // if space, return false
            if (isNaN(Number(value))) return false; // if not NaN and Number check on the value you put in return false
            if (Number(value) <= 0) return false; // if you value is minus or 0 return false
            return true; // otherwise return true
        };

        let calculateArea = () => {
            let lengthInput = document.getElementById('length').value;
            let widthInput = document.getElementById('width').value;
            let result = document.getElementById('result');

        if (!validNumber(lengthInput) || !validNumber(widthInput)) {
            result.textContent = 'Positive numbers only, no spaces, no zeros, no text!';
            return;
            }

            let area = Number(lengthInput) * Number(widthInput);
            result.textContent = `Area: ${area} Kvm`;
        };

        document.getElementById('calcBtn').addEventListener('click', calculateArea);
  </script>
</body>
</html>
