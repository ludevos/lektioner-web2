         function checkNumber(num) {
            if (num > 0) {
                console.log("The number is positive.");
            } else if (num < 0) {
                console.log("The number is negative.");
            } else {
                console.log("The number is zero.");
            }
        }
        checkNumber(5); 
        console.log("");
        checkNumber(-3);
        console.log("");
        checkNumber(0);
