<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch-sats</title>
</head>
<body>
    <script>
        let num = prompt("Enter a number from 1-3: ");
        switch (true) {
            case (num == 1):
                document.write("Shit happens.");
                break;
            case (num == 2):
                document.write("Dangerous. ");
                break;
            case (num == 3):
                document.write("Critical. ")
                break;
            default:
                document.write("Invalid input.")    
        }
    </script>
</body>
</html>
