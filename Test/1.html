<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>

    <link rel="stylesheet" href="style.css">
    <script src="buttons.js"></script>
    
</head>
<body>

    <!-- Button Alert -->
    <div class="container">
        <h1>Button Alert</h1>
        <p>This is a simple alert button example.</p>

        <button class="btn" id="alertButton">Click me</button>
    </div>
    
    <!-- Time Display -->
    <div class="container">
        <h1>Button Time</h1>
        <p>This is a simple time display button example.</p>

        <button class="btn" id="timeButton">See the time</button>
        <p id="timeDisplay"></p>
    </div>

    <!-- Lightbulb Display -->
    <div class="container">
        <h1>Light switch</h1>
        <p>This is a simple light switch example.</p>

        <button class="btn" id="turnOn">Turn On</button> <!-- Turn on -->
        <img id="lightbulb" src="img/lightbulbOff.gif" style="width:100px"> <!-- Lightbulb img -->
        <button class="btn" id="turnOff">Turn Off</button> <!-- Turn off -->
    </div>

    <div class="container">
        <h1></h1>
    </div>

</body>
</html>
