<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        p:hover {cursor: pointer;}
    </style>
</head>
<body>
    <button type="button" onclick="alert('Hello')">Click me</button>

    <p onClick="document.body.style.backgroundColor = 'lightblue';">Lightblue BG</p>
    
    <p id="text" onmouseover="document.getElementById('text').style.color='red'" 
       onmouseout="document.getElementById('text').style.color='black';">Hello</p>

    <p ></p>
</body>
</html>
