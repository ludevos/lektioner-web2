<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        p:hover{cursor: pointer; color: green;}
    </style>
</head>
<body>
    <p onClick="document.body.style.backgroundColor = 'lightblue';">Lightblue BG</p>
    <p onClick="document.body.style.backgroundColor = 'yellow';">Yellow BG</p>
    <p onClick="document.body.style.backgroundColor = 'lightgreen';">Lightgreen BG</p>
</body>
</html>
